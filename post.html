{% extends 'base.html' %}

{% block content %}

<h2>{{ post.title }}</h2>

<p>{{ post.content }}</p>

<hr>

<h4>Comments</h4>

{% for comment in comments %}
<div class="card mb-2">
    <div class="card-body">
        {{ comment.text }}
    </div>
</div>
{% else %}
<p>No comments yet.</p>
{% endfor %}

<form method="POST">

    <div class="mb-3">
        <textarea name="comment" class="form-control" placeholder="Write a comment..." required></textarea>
    </div>

    <button class="btn btn-primary">
        Add Comment
    </button>

</form>

{% endblock %}
