{% extends 'base.html' %}

{% block content %}

<h2>All Blog Posts</h2>

{% for post in posts %}

<div class="card mb-3">
    <div class="card-body">

        <h3>{{ post.title }}</h3>

        <p>{{ post.content[:150] }}...</p>

        <a href="{{ url_for('view_post', id=post.id) }}" class="btn btn-primary">
            Read More
        </a>

    </div>
</div>

{% else %}

<p>No blog posts available.</p>

{% endfor %}

{% endblock %}
