{% extends 'base.html' %}

{% block content %}

<h2>My Dashboard</h2>

<a href="{{ url_for('create_post') }}" class="btn btn-success mb-3">
    Create New Post
</a>

{% for post in posts %}

<div class="card mb-3">
    <div class="card-body">

        <h4>{{ post.title }}</h4>
        <p>{{ post.content }}</p>

        <a href="{{ url_for('edit_post', id=post.id) }}" class="btn btn-warning">
            Edit
        </a>

        <a href="{{ url_for('delete_post', id=post.id) }}" class="btn btn-danger">
            Delete
        </a>

        <a href="{{ url_for('view_post', id=post.id) }}" class="btn btn-primary">
            View
        </a>

    </div>
</div>

{% else %}

<p>No posts yet.</p>

{% endfor %}

{% endblock %}
